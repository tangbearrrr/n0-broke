<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta -->
    <title>N0broke — Personal Expense Tracker</title>
    <meta name="description" content="Track your monthly expenses, debts, and cash flow with N0broke." />
    <meta name="application-name" content="N0broke" />

    <!-- Theme -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#09090b" />
    <meta name="color-scheme" content="light dark" />

    <!-- Prevent flash of unstyled content by applying saved theme immediately -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (!t && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
