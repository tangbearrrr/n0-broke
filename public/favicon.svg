<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="#18181b"/>

  <!-- TrendingDown icon (lucide), centred and scaled to fit -->
